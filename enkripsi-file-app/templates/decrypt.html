{% extends "base.html" %}

{% block title %}Decrypt File{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10 col-lg-8">
        <div class="card p-lg-4">
            <div class="card-body">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Decrypt a File</h2>
                    <p class="text-muted-custom">Restore your original data by decrypting a file.</p>
                </div>
                
                <form method="post" enctype="multipart/form-data">
                    <!-- Step 1: File Upload -->
                    <div class="mb-4">
                        <label class="form-label">1. Upload Your Encrypted File</label>
                        <input class="d-none" type="file" id="file" name="file" required>
                        <div id="drop-zone" class="drop-zone">
                            <div id="file-info">
                                <i class="bi bi-cloud-arrow-up"></i>
                                <div>Drag & drop your file here, or click to select</div>
                            </div>
                        </div>
                    </div>

                    <!-- Step 2: Password -->
                    <div class="mb-4">
                        <label for="password" class="form-label">2. Enter Decryption Password</label>
                        <div class="position-relative">
                           <i class="bi bi-key input-group-icon"></i>
                           <input type="password" class="form-control form-control-icon" id="password" name="password" required placeholder="Enter the decryption password">
                        </div>
                        <div class="form-text">You must use the same password and method used for encryption.</div>
                    </div>

                    <!-- Step 3: Method Selection -->
                    <div class="mb-4">
                        <label class="form-label">3. Select Original Encryption Method</label>
                        <div class="row g-2">
                            <div class="col-6">
                                <input class="form-check-input d-none" type="radio" name="method" id="method_aes" value="aes" checked>
                                <label class="method-select-label text-center h-100" for="method_aes">
                                    <strong class="d-block">AES</strong>
                                    <small class="text-muted-custom">Standard</small>
                                </label>
                            </div>
                            <div class="col-6">
                                <input class="form-check-input d-none" type="radio" name="method" id="method_fernet" value="fernet">
                                <label class="method-select-label text-center h-100" for="method_fernet">
                                    <strong class="d-block">Fernet</strong>
                                    <small class="text-muted-custom">High-level</small>
                                </label>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Submit Button -->
                    <div class="d-grid">
                        <button type="submit" class="btn btn-secondary btn-lg">
                            <i class="bi bi-file-earmark-check-fill me-2"></i> Decrypt and Download
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
