{% extends "base.html" %}

{% block title %}Encrypt File{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-7">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">Encrypt a File</h3>
                <p class="text-center text-muted mb-4">Select a file, choose an encryption method, and set a password to secure your data.</p>
                
                <form method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="file" class="form-label">File to Encrypt</label>
                        <input class="form-control" type="file" id="file" name="file" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Encryption Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                        <div class="form-text">This password will be required for decryption. Keep it safe.</div>
                    </div>

                    <fieldset class="mb-3">
                        <legend class="form-label fs-6">Encryption Method</legend>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="method" id="method_aes" value="aes" checked>
                            <label class="form-check-label" for="method_aes">
                                AES (Advanced Encryption Standard) - Recommended
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="method" id="method_fernet" value="fernet">
                            <label class="form-check-label" for="method_fernet">
                                Fernet (High-level Symmetric Encryption)
                            </label>
                        </div>
                    </fieldset>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-lg">Encrypt and Download</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
