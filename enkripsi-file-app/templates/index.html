{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}
<div class="text-center mb-5">
    <h1 class="display-5 fw-bold">File Security, Simplified</h1>
    <p class="fs-4 text-muted-custom">Choose an action below to secure or access your files.</p>
</div>

<div class="row g-4 justify-content-center">
    <div class="col-md-5">
        <a href="{{ url_for('encrypt') }}" class="action-card">
            <div class="card h-100">
                <div class="card-body p-5">
                    <i class="bi bi-file-earmark-lock-fill icon-encrypt"></i>
                    <h3 class="card-title fw-bold">Encrypt File</h3>
                    <p class="text-muted-custom text-center">Secure your file with strong encryption.</p>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-5">
        <a href="{{ url_for('decrypt') }}" class="action-card">
            <div class="card h-100">
                <div class="card-body p-5">
                    <i class="bi bi-file-earmark-check-fill icon-decrypt"></i>
                    <h3 class="card-title fw-bold">Decrypt File</h3>
                    <p class="text-muted-custom text-center">Access your encrypted file securely.</p>
                </div>
            </div>
        </a>
    </div>
</div>
{% endblock %}
