{% extends "base.html" %}

{% block title %}Register - SecureCrypt{% endblock %}

{% block content %}
<div class="login-wrapper d-flex justify-content-center align-items-center flex-grow-1">
    <div class="col-md-5 col-lg-4">
        <div class="auth-card">
            <div class="card-body">
                <div class="auth-header">
                    <div class="auth-icon">
                        <i class="bi bi-lock-fill"></i>
                    </div>
                    <h3>
                        Create an Account
                    </h3>
                    <p>Enter your credentials to continue.</p>
                </div>
                
                <form method="post" action="{{ url_for('register') }}" novalidate>
                    <div class="form-floating mb-3">
                        <input
                            type="text"
                            class="form-control"
                            id="username"
                            name="username"
                            placeholder="Username"
                            autocomplete="username"
                            required
                            autofocus
                        >
                        <label for="username"><i class="bi bi-person"></i> Username</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input
                            type="password"
                            class="form-control"
                            id="password"
                            name="password"
                            placeholder="Password"
                            autocomplete="new-password"
                            required
                            minlength="6"
                        >
                        <label for="password"><i class="bi bi-lock"></i> Password</label>
                        <button type="button"
                                class="btn btn-sm btn-link position-absolute end-0 top-50 translate-middle-y me-2 text-decoration-none toggle-password"
                                aria-label="Tampilkan/sembunyikan password"
                                tabindex="-1">
                            <i class="bi bi-eye-slash" id="togglePasswordIcon"></i>
                        </button>
                    </div>

                    <div class="form-floating mb-3">
                        <input
                            type="password"
                            class="form-control"
                            id="confirm_password"
                            name="confirm_password"
                            placeholder="Confirm Password"
                            autocomplete="new-password"
                            required
                            minlength="6"
                        >
                        <label for="confirm_password"><i class="bi bi-check-circle"></i> Confirm Password</label>
                        <button type="button"
                                class="btn btn-sm btn-link position-absolute end-0 top-50 translate-middle-y me-2 text-decoration-none toggle-password-confirm"
                                aria-label="Tampilkan/sembunyikan konfirmasi password"
                                tabindex="-1">
                            <i class="bi bi-eye-slash" id="toggleConfirmPasswordIcon"></i>
                        </button>
                    </div>
                    <div class="form-text mb-3">Minimal 6 karakter.</div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-person-plus me-1"></i> Register
                        </button>
                    </div>
                </form>

                <div class="auth-footer">
                    <p>
                        Already have an account? <a href="{{ url_for('login') }}">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const togglePasswordBtn = document.querySelector('.toggle-password');
    const passwordInput = document.getElementById('password');
    const togglePasswordIcon = document.getElementById('togglePasswordIcon');

    if (togglePasswordBtn && passwordInput && togglePasswordIcon) {
        togglePasswordBtn.addEventListener('click', function () {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            togglePasswordIcon.classList.toggle('bi-eye');
            togglePasswordIcon.classList.toggle('bi-eye-slash');
        });
    }

    const toggleConfirmPasswordBtn = document.querySelector('.toggle-password-confirm');
    const confirmPasswordInput = document.getElementById('confirm_password');
    const toggleConfirmPasswordIcon = document.getElementById('toggleConfirmPasswordIcon');

    if (toggleConfirmPasswordBtn && confirmPasswordInput && toggleConfirmPasswordIcon) {
        toggleConfirmPasswordBtn.addEventListener('click', function () {
            const isPassword = confirmPasswordInput.type === 'password';
            confirmPasswordInput.type = isPassword ? 'text' : 'password';
            toggleConfirmPasswordIcon.classList.toggle('bi-eye');
            toggleConfirmPasswordIcon.classList.toggle('bi-eye-slash');
        });
    }
});
</script>
{% endblock %}
